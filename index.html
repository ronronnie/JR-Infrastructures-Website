<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/images/logo-mark.png" />
    <link rel="apple-touch-icon" href="/images/logo-mark.png" />
    <meta name="theme-color" content="#1f1d1b" />

    <!-- Primary meta -->
    <title>JR Infrastructures — Interior Design, Construction & Civil Work</title>
    <meta
      name="description"
      content="JR Infrastructures is your complete build partner — interior design, architecture, construction, and civil work delivered end to end by one accountable team."
    />

    <!--
      Update this to your live domain so social previews resolve the OG image.
      WhatsApp/Facebook/LinkedIn require an absolute URL for og:image.
    -->
    <link rel="canonical" href="https://jrinfrastructures.com/" />

    <!-- Open Graph (WhatsApp, Facebook, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="JR Infrastructures" />
    <meta
      property="og:title"
      content="JR Infrastructures — Interior Design, Construction & Civil Work"
    />
    <meta
      property="og:description"
      content="Your complete build partner — interior design, architecture, construction, and civil work, delivered end to end."
    />
    <meta property="og:url" content="https://jrinfrastructures.com/" />
    <meta
      property="og:image"
      content="https://jrinfrastructures.com/og-image.jpg"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="JR Infrastructures" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="JR Infrastructures — Interior Design, Construction & Civil Work"
    />
    <meta
      name="twitter:description"
      content="Your complete build partner — interior design, architecture, construction, and civil work, delivered end to end."
    />
    <meta
      name="twitter:image"
      content="https://jrinfrastructures.com/og-image.jpg"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
